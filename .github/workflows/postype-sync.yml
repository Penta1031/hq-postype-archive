name: Postype Sync

on:
  push:
    branches:
      - main
    paths:
      - "crawler/**"
      - ".github/workflows/postype-sync.yml"
  schedule:
    # GitHub cron uses UTC. 19:00 UTC is 04:00 KST the next day.
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      post_url:
        description: "확인할 포스타입 글 링크 (비우면 전체 소스 확인)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: postype-sync
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: crawler

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run check

      - run: npm start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTYPE_AUTH_STATE: ${{ secrets.POSTYPE_AUTH_STATE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ADMIN_PAGE_URL: ${{ vars.ADMIN_PAGE_URL }}
          POSTYPE_SOURCE_URLS: ${{ vars.POSTYPE_SOURCE_URLS }}
          MANUAL_POST_URL: ${{ inputs.post_url || '' }}
