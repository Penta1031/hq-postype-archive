<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>혚쾌 포타 검색기</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #12161d;
      --panel-2: #171d26;
      --text: #eef2f7;
      --muted: #98a2b3;
      --soft: #c9d2df;
      --line: #273140;
      --line-2: #354254;
      --accent: #60a5fa;
      --accent-2: #34d399;
      --danger: #fb7185;
      --warn: #fbbf24;
      --radius: 8px;
      --shadow: 0 16px 40px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Pretendard, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a { color: inherit; }
    button, input, select, textarea { font: inherit; }

    .shell {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 4px 0 20px;
    }

    .brand {
      display: grid;
      gap: 6px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      min-height: 38px;
      border: 1px solid var(--line-2);
      border-radius: 7px;
      padding: 0 12px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
    }

    .button:hover { border-color: var(--accent); }
    .button.primary { background: var(--accent); border-color: var(--accent); color: #06111f; font-weight: 800; }
    .button.danger { color: var(--danger); }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .filters {
      position: sticky;
      top: 16px;
      padding: 14px;
    }

    .search {
      display: grid;
      gap: 8px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line-2);
      border-radius: 7px;
      background: #0e1218;
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }

    textarea { min-height: 82px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }

    .filter-group {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border: 1px solid var(--line-2);
      border-radius: 999px;
      padding: 5px 8px;
      background: transparent;
      color: var(--soft);
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      background: rgba(96, 165, 250, .16);
      border-color: var(--accent);
      color: var(--text);
    }

    .content {
      display: grid;
      gap: 12px;
    }

    .stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      color: var(--muted);
    }

    .stats strong { color: var(--text); }

    .post-list {
      display: grid;
      gap: 10px;
    }

    .post-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 14px;
    }

    .post-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      color: var(--text);
      text-decoration: none;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.35;
    }

    .title:hover { color: var(--accent); }

    .meta {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .summary {
      margin: 10px 0 0;
      color: var(--soft);
      line-height: 1.58;
    }

    .badges, .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badges { justify-content: flex-end; min-width: 86px; }
    .tag-row { margin-top: 11px; }

    .badge, .tag {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 750;
    }

    .badge { background: #1f2937; color: var(--soft); }
    .badge.age { background: rgba(251, 113, 133, .16); color: #fecdd3; }
    .badge.price { background: rgba(251, 191, 36, .16); color: #fde68a; }
    .tag { background: #172033; color: #dbeafe; }
    .tag.suggested { background: #1a2a22; color: #bbf7d0; }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .link-button {
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .empty, .status {
      padding: 28px 14px;
      border: 1px dashed var(--line-2);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
    }

    .admin {
      display: none;
      margin-top: 16px;
      padding: 14px;
    }

    body.admin-on .admin { display: block; }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .admin-grid .wide { grid-column: 1 / -1; }
    .admin-note { color: var(--muted); font-size: 13px; line-height: 1.55; }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .filters { position: static; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
    }

    @media (max-width: 560px) {
      .shell { width: min(100% - 20px, 1280px); padding-top: 16px; }
      .admin-grid { grid-template-columns: 1fr; }
      .post-head { display: grid; }
      .badges { justify-content: flex-start; }
    }
  </style>

    function normalize(value) {
      return String(value ?? "").trim();

      return normalize(value).split(/[,，、/|·\n]/).map((item) => item.trim()).filter(Boolean);
    }

    function truthyMark(value) {
      return ["O", "TRUE", "true", "1", "성인", "유료"].includes(normalize(value));

    function priceLabel(post) {

      if (group === "스포일러") return splitTags(post["엔딩"]);
      return splitTags(post[group]);

    }

    function loadSheet() {
      return new Promise((resolve, reject) => {
        const callbackName = `__sheetCallback_${Date.now()}`;
        const script = document.createElement("script");
        window[callbackName] = (payload) => {
          delete window[callbackName];
          script.remove();
          resolve(parseGviz(payload));
        };
        script.onerror = () => {
          delete window[callbackName];
          script.remove();
          reject(new Error("구글 시트를 불러오지 못했습니다. 공유 권한이나 시트 공개 상태를 확인해 주세요."));
        };
        script.src = gvizUrl().replace("__sheetCallback", callbackName);
        document.head.appendChild(script);
      });

    function parseGviz(payload) {
      const cols = payload.table.cols.map((col, index) => normalize(col.label) || `col_${index}`);
      return payload.table.rows.map((row, rowIndex) => {
        const item = { _rowNumber: String(rowIndex + 2), _source: "sheet" };
        cols.forEach((key, index) => {
          const cell = row.c[index];
          item[key] = cell ? normalize(cell.f ?? cell.v) : "";

        return normalize(item["제목"]) || normalize(item["링크"]) ? item : null;

        if (post._deleted || !String(post._rowNumber).startsWith("local-")) return false;
        const link = normalize(post["링크"]);
        return !link || !sheetLinks.has(link);
      });
      const mergedSheet = sheetPosts
        .filter((post) => !deleted.has(post._rowNumber))
        .map((post) => overrides.get(post._rowNumber) || post);
      return [...localOnly, ...mergedSheet];
    }

    async function loadData() {
      els.status.textContent = "구글 시트 데이터를 불러오는 중입니다.";
      try {
        const sheetPosts = await loadSheet();
        state.posts = mergeSheetAndLocal(sheetPosts);
        els.status.textContent = `구글 시트 ${sheetPosts.length.toLocaleString("ko-KR")}개를 불러왔습니다.`;
      } catch (error) {
        state.posts = mergeSheetAndLocal(SAMPLE_POSTS);
        els.status.textContent = `${error.message} 지금은 샘플/로컬 데이터로 표시합니다.`;
      }
      buildFilters();
      render();
    }

    function buildFilters() {
      els.filterMount.innerHTML = "";
      Object.entries(TAG_GROUPS).forEach(([group, options]) => {
        const box = document.createElement("div");
        box.className = "filter-group";
        box.dataset.group = group;
        const label = document.createElement("span");
        label.className = "label";
        label.textContent = group;
        const chips = document.createElement("div");
        chips.className = "chips";
        options.forEach((option) => {
          const button = document.createElement("button");
          button.className = "chip";
          button.type = "button";
          button.textContent = option;
          button.dataset.group = group;
          button.dataset.option = option;
          button.addEventListener("click", () => {
            state.active[group] ||= new Set();
            state.active[group].has(option) ? state.active[group].delete(option) : state.active[group].add(option);
            button.classList.toggle("active");
            render();
          });
          chips.appendChild(button);
        });
        box.append(label, chips);
        els.filterMount.appendChild(box);
      });
    }

    function filteredPosts() {
      const query = normalize(state.query).toLowerCase();
      return state.posts.filter((post) => matchesPost(post, state.active, query)).sort((a, b) => {
        if (state.sort === "title-asc") return normalize(a["제목"]).localeCompare(normalize(b["제목"]), "ko");
        if (state.sort === "author-asc") return normalize(a["작가"]).localeCompare(normalize(b["작가"]), "ko");
        return Date.parse(normalize(b["날짜"])) - Date.parse(normalize(a["날짜"]));
      });
    }

    function matchesPost(post, activeGroups = state.active, query = normalize(state.query).toLowerCase()) {
      if (query && !allSearchText(post).includes(query)) return false;
      return Object.entries(activeGroups).every(([group, selected]) => {
        if (!selected || !selected.size) return true;
        const tags = tagsFor(post, group);
        return [...selected].every((tag) => tags.includes(tag));
      });
    }

    function cloneActiveGroups() {
      return Object.fromEntries(
        Object.entries(state.active).map(([group, selected]) => [group, new Set(selected)])
      );
    }

    function hasMatchesWithOption(group, option) {
      const active = cloneActiveGroups();
      active[group] ||= new Set();
      active[group].add(option);
      const query = normalize(state.query).toLowerCase();
      return state.posts.some((post) => matchesPost(post, active, query));
    }

    function updateFilterVisibility() {
      document.querySelectorAll(".filter-group").forEach((groupEl) => {
        const group = groupEl.dataset.group;
        let visibleCount = 0;
        groupEl.querySelectorAll(".chip").forEach((chip) => {
          const option = chip.dataset.option;
          const isActive = state.active[group] && state.active[group].has(option);
          const canMatch = isActive || hasMatchesWithOption(group, option);
          chip.classList.toggle("is-hidden", !canMatch);
          if (canMatch) visibleCount += 1;
        });
        groupEl.classList.toggle("is-hidden", visibleCount === 0);
      });
    }

    function renderAdminList() {
      els.adminList.innerHTML = "";
      const query = normalize(state.adminQuery).toLowerCase();
      const posts = state.posts
        .filter((post) => !query || allSearchText(post).includes(query) || normalize(post["링크"]).toLowerCase().includes(query))
        .slice()
        .sort((a, b) => {
          return Date.parse(normalize(b["날짜"])) - Date.parse(normalize(a["날짜"]));
        });
      if (!state.posts.length) {
        els.adminList.innerHTML = `<div class="empty">아직 불러온 글이 없습니다.</div>`;
        return;
      }
      if (!posts.length) {
        els.adminList.innerHTML = `<div class="empty">관리자 검색 결과가 없습니다.</div>`;
        return;
      }
      posts.forEach((post) => {
        const button = document.createElement("button");
        button.className = "admin-item";
        button.type = "button";
        button.innerHTML = `
          <span class="admin-item-title">${escapeHtml(normalize(post["제목"]) || "제목 없음")}</span>
          <span class="admin-item-meta">${escapeHtml([post["날짜"], post["작가"]].map(normalize).filter(Boolean).join(" · ") || "정보 없음")}</span>
        `;
        button.addEventListener("click", () => fillAdminForm(post, button));
        els.adminList.appendChild(button);
      });
    }

    function escapeHtml(value) {
      return normalize(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function render() {
      const posts = filteredPosts();
      els.visible.textContent = posts.length.toLocaleString("ko-KR");
      els.total.textContent = "글 목록";
      els.list.innerHTML = "";
      if (!posts.length) {
        els.list.innerHTML = `<div class="empty">조건에 맞는 글이 없습니다.</div>`;
        updateFilterVisibility();
        renderAdminList();
        return;
      }
      posts.forEach((post) => els.list.appendChild(renderPost(post)));
      updateFilterVisibility();
      renderAdminList();
    }

    function renderPost(post) {
      const node = els.template.content.firstElementChild.cloneNode(true);
      const title = node.querySelector(".title");
      const meta = node.querySelector(".meta");
      const badges = node.querySelector(".badges");
      const tagRow = node.querySelector(".tag-row");
      const edit = node.querySelector(".edit-button");

      title.textContent = normalize(post["제목"]) || "제목 없음";
      title.href = normalize(post["링크"]) || "#";
      meta.textContent = [post["날짜"], post["작가"]].map(normalize).filter(Boolean).join(" · ");

      badges.appendChild(makeBadge(postCategory(post), "category"));
      badges.appendChild(makeBadge(ageLabel(post), "age"));
      badges.appendChild(makeBadge(priceLabel(post), "price"));

      ["장르", "키워드", "공", "수"].forEach((group) => {
        splitTags(post[group]).forEach((tag) => tagRow.appendChild(makeTag(tag)));
      });
      renderEndingTags(post, tagRow);
      edit.addEventListener("click", () => fillAdminForm(post));
      return node;
    }

    function renderEndingTags(post, tagRow) {
      const endings = splitTags(post["엔딩"]);
      const visible = endings.filter((tag) => tag === "해피엔딩");
      const hidden = endings.filter((tag) => tag && tag !== "해피엔딩");
      visible.forEach((tag) => tagRow.appendChild(makeTag(tag, false, "spoiler")));
      if (!hidden.length) return;

      const button = document.createElement("button");
      button.className = "ending-reveal";
      button.type = "button";
      button.textContent = "스포일러 보기";
      button.addEventListener("click", () => {
        button.remove();
        hidden.forEach((tag) => tagRow.appendChild(makeTag(tag, false, "spoiler")));
      });
      tagRow.appendChild(button);
    }

    function makeBadge(text, type = "") {
      const el = document.createElement("span");
      el.className = `badge ${type}`;
      el.textContent = text;
      return el;
    }

    function makeTag(text, suggested = false, extraClass = "") {
      const el = document.createElement("span");
      el.className = `tag${suggested ? " suggested" : ""}${extraClass ? ` ${extraClass}` : ""}`;
      el.textContent = suggested ? `제안: ${text}` : text;
      return el;
    }

    function placeAdminEditor(anchor) {
      if (anchor) {
        anchor.insertAdjacentElement("afterend", els.adminEditor);
      }
    }

    function fillAdminForm(post, anchor) {
      document.body.classList.add("admin-on");
      placeAdminEditor(anchor);
      els.adminEditorTitle.textContent = "글 수정";
      els.deletePost.hidden = false;
      els.adminEditor.hidden = false;
      [...els.adminForm.elements].forEach((field) => {
        if (!field.name) return;
        field.value = post[field.name] || "";
      });
      els.adminForm.elements["_rowNumber"].value = post._rowNumber || "";
    }

    function openNewPostForm() {
      document.body.classList.add("admin-on");
      placeAdminEditor(document.querySelector(".admin-head"));
      els.adminForm.reset();
      els.adminEditorTitle.textContent = "신규 글 추가";
      els.deletePost.hidden = true;
      els.adminForm.elements["_rowNumber"].value = "";
      els.adminEditor.hidden = false;
    }

    function closeAdminEditor() {
      els.adminForm.reset();
      els.adminEditor.hidden = true;
    }

    function toggleAdminMode() {
      if (document.body.classList.contains("admin-on")) {
        document.body.classList.remove("admin-on");
        closeAdminEditor();
        return;
      }
      const password = window.prompt("관리자 비밀번호를 입력해 주세요.");
      if (password !== ADMIN_PASSWORD) {
        if (password !== null) alert("비밀번호가 맞지 않습니다.");
        return;
      }
      document.body.classList.add("admin-on");
      renderAdminList();
    }

    function formData() {
      const data = {};
      new FormData(els.adminForm).forEach((value, key) => data[key] = normalize(value));
      data._source = data._rowNumber ? "local-edit" : "local";
      data._rowNumber ||= `local-${Date.now()}`;
      return data;
    }

    async function sendAdminAction(action, payload) {
      if (!CONFIG.ADMIN_API_URL) return { ok: false, localOnly: true };
      await fetch(CONFIG.ADMIN_API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, payload })
      });
      return { ok: true, opaque: true };
    }

    async function savePost(event) {
      event.preventDefault();
      const data = formData();
      const action = data._rowNumber && !data._rowNumber.startsWith("local-") ? "update" : "create";
      upsertLocal(data);
      state.posts = mergeSheetAndLocal(state.posts);
      render();
      closeAdminEditor();
      els.status.textContent = "저장 내용을 화면에 반영했습니다. 구글 시트에도 전송 중입니다.";
      try {
        await sendAdminAction(action, data);
        await loadData();
      } catch (error) {
        els.status.textContent = `화면에는 저장했지만 구글 시트 전송은 실패했습니다: ${error.message}`;
      }
    }

    function upsertLocal(data) {
      const posts = localPosts();
      const index = posts.findIndex((post) => post._rowNumber === data._rowNumber);
      data._deleted = false;
      index >= 0 ? posts.splice(index, 1, data) : posts.unshift(data);
      saveLocalPosts(posts);
    }

    async function deleteCurrentPost() {
      const rowNumber = normalize(els.adminForm.elements["_rowNumber"].value);
      if (!rowNumber) return;
      if (rowNumber.startsWith("local-")) {
        saveLocalPosts(localPosts().filter((post) => post._rowNumber !== rowNumber));
      } else {
        const posts = localPosts().filter((post) => post._rowNumber !== rowNumber);
        posts.unshift({ _rowNumber: rowNumber, _deleted: true });
        saveLocalPosts(posts);
      }
      state.posts = mergeSheetAndLocal(state.posts.filter((post) => post._rowNumber !== rowNumber));
      closeAdminEditor();
      render();
      els.status.textContent = "삭제 내용을 화면에 반영했습니다. 구글 시트에도 전송 중입니다.";
      try {
        await sendAdminAction("delete", { _rowNumber: rowNumber });
        await loadData();
      } catch (error) {
        els.status.textContent = `화면에는 삭제했지만 구글 시트 전송은 실패했습니다: ${error.message}`;
      }
    }

    function recommendRandomPost(scope = "current") {
      state.randomScope = scope;
      const current = filteredPosts();
      const pool = scope === "all" ? state.posts : current.length ? current : state.posts;
      if (!pool.length) {
        alert("추천할 글을 아직 불러오지 못했습니다.");
        return;
      }
      const post = pool[Math.floor(Math.random() * pool.length)];
      showRandomPost(post);
    }

    function toggleRandomPanel() {
      els.randomPanel.hidden = !els.randomPanel.hidden;
    }

    function showRandomPost(post) {
      state.randomPost = post;
      els.randomResultTitle.textContent = normalize(post["제목"]) || "제목 없음";
      els.randomResultMeta.textContent = [post["날짜"], post["작가"], postCategory(post), ageLabel(post), priceLabel(post)]
        .map(normalize)
        .filter(Boolean)
        .join(" · ");
      els.randomResultTags.innerHTML = "";
      ["장르", "키워드", "공", "수"].forEach((group) => {
        splitTags(post[group]).slice(0, 10).forEach((tag) => els.randomResultTags.appendChild(makeTag(tag)));
      });
      renderEndingTags(post, els.randomResultTags);
      els.randomOpen.disabled = !normalize(post["링크"]);
      els.randomResult.hidden = false;
    }

    function closeRandomResult() {
      els.randomResult.hidden = true;
    }

    function openRandomPost() {
      const link = normalize(state.randomPost && state.randomPost["링크"]);
      if (!link) {
        alert("추천된 글에 링크가 없습니다. 다시 추천을 눌러 주세요.");
        return;
      }
      window.open(link, "_blank", "noopener");
    }

    els.search.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });
    els.sort.addEventListener("input", (event) => {
      state.sort = event.target.value;
      render();
    });
    els.sortButtons.addEventListener("click", (event) => {
      const button = event.target.closest("[data-sort]");
      if (!button) return;
      state.sort = button.dataset.sort;
      els.sort.value = state.sort;
      [...els.sortButtons.querySelectorAll(".sort-pill")].forEach((item) => {
        item.classList.toggle("active", item === button);
      });
      render();
    });
    els.filterToggle.addEventListener("click", () => {
      const filters = document.querySelector(".filters");
      filters.classList.toggle("collapsed");
      els.filterCaret.textContent = filters.classList.contains("collapsed") ? "펼치기" : "접기";
    });
    els.adminSearch.addEventListener("input", (event) => {
      state.adminQuery = event.target.value;
      renderAdminList();
    });
    els.adminToggle.addEventListener("click", toggleAdminMode);
    els.newPost.addEventListener("click", openNewPostForm);
    els.clearForm.addEventListener("click", closeAdminEditor);
    els.deletePost.addEventListener("click", deleteCurrentPost);
    els.adminForm.addEventListener("submit", savePost);
    els.adminEditor.addEventListener("click", (event) => {
      if (event.target === els.adminEditor) closeAdminEditor();
    });
    els.randomToggle.addEventListener("click", toggleRandomPanel);
    els.randomCurrent.addEventListener("click", () => {
      els.randomPanel.hidden = true;
      recommendRandomPost("current");
    });
    els.randomAll.addEventListener("click", () => {
      els.randomPanel.hidden = true;
      recommendRandomPost("all");
    });
    els.randomReroll.addEventListener("click", () => recommendRandomPost(state.randomScope));
    els.randomOpen.addEventListener("click", openRandomPost);
    els.randomClose.addEventListener("click", closeRandomResult);
    els.randomCancel.addEventListener("click", closeRandomResult);
    els.randomResult.addEventListener("click", (event) => {
      if (event.target === els.randomResult) closeRandomResult();
    });

    loadData();
  </script>
</body>
</html>
